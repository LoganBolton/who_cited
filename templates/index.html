<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>who_cited — every paper that cites yours</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="wrap">
    <header>
      <p class="kicker">scholar tools <span class="dot"></span> v0.1</p>
      <h1>who <em>cited</em> what.</h1>
      <p class="sub">
        Drop in a Google Scholar link. Get every paper that cites it,
        each author, and where they work.
      </p>
    </header>

    <form id="search-form">
      <div class="field">
        <label for="url">scholar URL</label>
        <input
          id="url"
          name="url"
          type="url"
          placeholder="scholar.google.com/scholar?cites=…"
          autocomplete="off"
        />
      </div>

      <details id="title-fallback">
        <summary>paste a paper title instead</summary>
        <div class="field" style="margin-top: 8px;">
          <input id="title" name="title" type="text" placeholder="Attention Is All You Need" autocomplete="off" />
        </div>
      </details>

      <section class="presets" aria-labelledby="presets-label">
        <p id="presets-label">try a common paper</p>
        <div class="preset-buttons">
          <button
            type="button"
            data-title="HoT: Highlighted Chain of Thought for Referencing Supporting Facts from Inputs"
            data-url="https://scholar.google.com/scholar_lookup?arxiv_id=2503.02003&amp;hl=en"
          >HoT</button>
          <button type="button" data-title="Attention Is All You Need">Attention Is All You Need</button>
          <button type="button" data-title="BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding">BERT</button>
          <button type="button" data-title="Deep Residual Learning for Image Recognition">ResNet</button>
          <button type="button" data-title="ImageNet Classification with Deep Convolutional Neural Networks">AlexNet</button>
          <button type="button" data-title="Generative Adversarial Nets">GANs</button>
          <button type="button" data-title="Adam: A Method for Stochastic Optimization">Adam</button>
        </div>
      </section>

      <button type="submit" id="submit-btn">find citations</button>
    </form>

    <section id="status" class="status" hidden></section>

    <section id="paper" class="paper" hidden>
      <h2 id="paper-title"></h2>
      <p id="paper-meta"></p>
    </section>

    <section id="results" hidden>
      <h3>
        <span id="count">0</span>
        <span>citing papers</span>
        <span id="total-suffix"></span>
      </h3>
      <ol id="results-list"></ol>
    </section>

    <footer>
      <p>
        Citations via
        <a href="https://api.semanticscholar.org/" target="_blank" rel="noreferrer">Semantic Scholar</a>
        &nbsp;·&nbsp; Affiliations via
        <a href="https://openalex.org/" target="_blank" rel="noreferrer">OpenAlex</a>
        &nbsp;·&nbsp;
        <a href="https://github.com/LoganBolton/who_cited" target="_blank" rel="noreferrer">source</a>
      </p>
    </footer>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
